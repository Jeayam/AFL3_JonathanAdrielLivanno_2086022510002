<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/Styles.css">
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="Home.html">Portfolio<span class="text-info">.</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="About.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="Skills.html">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="Project.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="Gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 flex-grow-1">
        <div id="successAlert" class="alert alert-success d-none mb-4" role="alert">
            Pesan Anda telah berhasil dikirim melalui sistem kami!
        </div>

        <div class="row g-4 mt-2">
            <div class="col-md-6">
                <div class="card bg-white text-dark p-4 h-100 shadow rounded-4">
                    <h2 class="fw-bold mb-4">Contact Information</h2>
                    <div class="d-flex align-items-start mb-4">
                        <i class="fa-regular fa-envelope mt-1 me-3 fs-4 text-secondary"></i>
                        <div>
                            <p class="mb-0 text-secondary small">Email</p>
                            <p class="fw-bold mb-0">jlivanno@student.ciputra.id</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-start mb-4">
                        <i class="fa-solid fa-phone mt-1 me-3 fs-4 text-secondary"></i>
                        <div>
                            <p class="mb-0 text-secondary small">Phone</p>
                            <p class="fw-bold mb-0">+62 822 - 5208 - 7070</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-start">
                        <i class="fa-solid fa-location-dot mt-1 me-3 fs-4 text-secondary"></i>
                        <div>
                            <p class="mb-0 text-secondary small">Location</p>
                            <p class="fw-bold mb-0">Makassar, Indonesia</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-white text-dark p-4 h-100 shadow rounded-4">
                    <h2 class="fw-bold mb-4">Send a Message</h2>
                    <form id="contactForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Name</label>
                            <!-- ID 'name' ditambahkan agar dibaca JS -->
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Message</label>
                            <textarea class="form-control" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 border-top border-secondary bg-dark w-100">
        <p class="text-secondary small mb-0">&copy; 2026 Student Portfolio.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
